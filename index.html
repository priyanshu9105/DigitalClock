<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Digital Clock Card -->
        <div class="card clock-card">
            <h2>Current Time</h2>
            <div id="digital-clock" class="display">00:00:00 PM</div>
        </div>

        <!-- Countdown Timer Card -->
        <div class="card countdown-card">
            <h2>Countdown to New Year</h2>
            <div id="countdown" class="display">00d 00h 00m 00s</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
